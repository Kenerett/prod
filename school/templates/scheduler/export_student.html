{% extends 'scheduler/base.html' %}

{% block title %}Schedule Export for Students{% endblock %}
{% block content %}
<h2>Schedule Export for Students</h2>

<form method="get" action="{% url 'export_schedule_student' %}" class="mt-3">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="group" class="form-label">Select Group</label>
            <select class="form-select" id="group" name="group" required>
                <option value="">---</option>
                {% for group in groups %}
                    <option value="{{ group.id }}">{{ group.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-6 mb-3">
            <label for="weekday" class="form-label">Weekday (Mon–Fri)</label>
            <select class="form-select" id="weekday" name="weekday">
                <option value="">All days</option>
                {% for value, label in weekdays %}
                    <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <button type="submit" class="btn btn-primary">Download Excel</button>
</form>
{% endblock %}
