<!-- templates/tutor/create_group.html -->
{% extends 'tutor/base.html' %} <!-- Use your base template for the tutor -->

{% block title %}Create Group{% endblock %}

{% block content %}
<h2>Create New Group</h2>

<form method="post">
    {% csrf_token %}
    <label for="name">Group Name:</label>
    <input type="text" name="name" id="name" required>
    <button type="submit">Create Group</button>
    <a href="{% url 'tutor_dashboard' %}">Cancel</a> <!-- Replace with your URL -->
</form>
{% endblock %}
