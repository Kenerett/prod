{% extends "school/base.html" %}
{% block title %}Password Reset - Invalid Link{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Error</h2>
    <div class="alert alert-danger" role="alert">
        <p>The password reset link is invalid. It may have already been used or the link has expired.</p>
    </div>
    <a href="{% url 'password_reset' %}" class="btn btn-primary">Request New Link</a>
    <a href="{% url 'login' %}" class="btn btn-secondary">Return to Login Page</a>
</div>
{% endblock %}
